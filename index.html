<!DOCTYPE html>
<html>
<head>
    <title>My Game Library</title>
</head>
<body>
    <h1>My Games</h1>
    <p>Minimalist download portal.</p>
    
    <ul>
        <li><a href="mygame_v1.zip">Download My Game (v1.0)</a></li>
    </ul>

    <hr>

    <h2>Public Data Library (Experimental)</h2>
    <p>Current Data Count: <span id="data-count">Loading...</span></p>
    
    <script>
        // Since GitHub Pages is static, you can't "save" data to it.
        // But you can FETCH data from public APIs to display it.
        async function loadData() {
            try {
                // Example: Fetching some public data from a dummy API
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                const data = await response.json();
                document.getElementById('data-count').innerText = data.length + " entries found.";
            } catch (e) {
                document.getElementById('data-count').innerText = "Error loading data.";
            }
        }
        loadData();
    </script>
</body>
</html>
